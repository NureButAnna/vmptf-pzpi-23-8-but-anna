{% extends 'news/layout.html' %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}
    <p class="back-link"><a href="{% url 'article_list' %}">← Назад до новин</a></p>
    <article class="item">
        <h1>{{ article.title }}</h1>
        <p>{{ article.text }}</p>
        <div class="article-meta">
            <p class="author">{{ article.author }}</p>
            <p class="date">{{ article.date }}</p>
        </div>
    </article>
{% endblock %}
